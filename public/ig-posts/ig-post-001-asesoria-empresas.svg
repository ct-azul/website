<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <rect width="1080" height="1080" fill="#0d1b2e"/>
  <defs>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M 54 0 L 0 0 0 54" fill="none" stroke="#1a2d45" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#2b7fff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0d1b2e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#grid)"/>
  <rect width="1080" height="1080" fill="url(#glow)"/>
  <rect x="0" y="0" width="1080" height="4" fill="#2b7fff" opacity="0.7"/>
  <rect x="0" y="1076" width="1080" height="4" fill="#2b7fff" opacity="0.3"/>

  <!-- Logo + name row -->
  <image x="245" y="68" width="48" height="48" href="data:image/png;base64,"/>
  <text x="307" y="102"
    font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
    font-size="30" font-weight="500" fill="#4a5e7a"
    text-anchor="start" letter-spacing="3">
    CLUSTER TECNOLÓGICO AZUL
  </text>

  <!-- Main headline -->
  <text x="540" y="300"
    font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
    font-size="70" font-weight="700" fill="#d8e3f0"
    text-anchor="middle" letter-spacing="-1">
    Asesoría en IA
  </text>
  <text x="540" y="380"
    font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
    font-size="70" font-weight="700" fill="#d8e3f0"
    text-anchor="middle" letter-spacing="-1">
    para tu empresa
  </text>

  <!-- Separator -->
  <rect x="380" y="435" width="320" height="2" fill="#243d5c"/>

  <!-- Bullet points -->
  <text x="290" y="510" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="28" fill="#00d4c8">✦</text>
  <text x="330" y="510" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="28" fill="#8399bb">Automatización de procesos</text>

  <text x="290" y="566" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="28" fill="#00d4c8">✦</text>
  <text x="330" y="566" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="28" fill="#8399bb">Asistentes con IA</text>

  <text x="290" y="622" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="28" fill="#00d4c8">✦</text>
  <text x="330" y="622" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="28" fill="#8399bb">Análisis de datos</text>

  <text x="290" y="678" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="28" fill="#00d4c8">✦</text>
  <text x="330" y="678" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="28" fill="#8399bb">Capacitación del equipo</text>

  <!-- CTA box -->
  <rect x="200" y="755" width="680" height="104" rx="12" fill="#1a2d45" stroke="#2b7fff" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="540" y="796"
    font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
    font-size="22" font-weight="400" fill="#8399bb"
    text-anchor="middle">
    Link en la bio →
  </text>
  <text x="540" y="835"
    font-family="ui-monospace,'Cascadia Code',monospace"
    font-size="24" font-weight="500" fill="#d8e3f0"
    text-anchor="middle">
    clustertecnologicoazul.org/empresas
  </text>

  <!-- Footer -->
  <text x="540" y="980"
    font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
    font-size="26" fill="#4a5e7a"
    text-anchor="middle" letter-spacing="1">
    Azul · Buenos Aires · Argentina
  </text>
</svg>